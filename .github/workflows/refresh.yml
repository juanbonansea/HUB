name: Refresh PM Hub

on:
  # Manual trigger (used by the "Actualizar" button via API)
  workflow_dispatch:

  # Automatic daily refresh — every weekday at 7:30am Bogota (12:30 UTC)
  schedule:
    - cron: "30 12 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude to refresh HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --model claude-sonnet-4-6 \
            "Read /home/runner/work/rappi-pm-hub/rappi-pm-hub/index.html. \
            Update ONLY the data arrays (EVENTS, NOTES, DEFAULT_TASKS, DEFAULT_DELEGATED, SLACK_FEED, DEEP_WORK) \
            and the date constants (DAYS, DAY_NAMES_LONG, DAY_DATES, getTodayIndex boundaries) \
            to reflect the current work week (Mon-Fri). \
            Also update the 'Semana X-X Abril' header and 'Ultima actualizacion' timestamp. \
            IMPORTANT: This is a best-effort refresh with NO MCP access. \
            Only update the timestamp and date-related fields to today's date. \
            Do NOT invent meeting data — preserve existing EVENTS/NOTES unless you have real sources. \
            Just update: timestamps, day labels, today's date in the refreshStatus div."

      - name: Update timestamp via sed (fallback)
        run: |
          TS=$(TZ='America/Bogota' date +'%a %d %b, %I:%M%p' | tr '[:upper:]' '[:lower:]' | sed 's/\b\(.\)/\u\1/g')
          sed -i "s/Ultima actualizacion: [^<]*/Ultima actualizacion: $TS/" index.html || true

      - name: Commit and push
        run: |
          git config user.name "PM Hub Bot"
          git config user.email "bot@rappi-pm-hub"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-refresh $(TZ='America/Bogota' date +'%Y-%m-%d %H:%M')"
            git push
          fi
